services:
  postgres:
    image: postgres:18.3-alpine3.23
    container_name: rps-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    command: sh -lc "bun install && DATABASE_URL=postgresql://postgres:postgres@postgres:5432/postgres bun run --filter server dev"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      PORT: "2567"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "2567:2567"
    volumes:
      - .:/app
      - bun-node_modules:/app/node_modules
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    command: sh -lc "bun install && bun run --filter client dev --host 0.0.0.0"
    depends_on:
      - server
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - bun-node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  postgres-data:
  bun-node_modules:
