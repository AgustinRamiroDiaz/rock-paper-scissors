services:
  postgres:
    image: postgres:18.3-alpine3.23
    container_name: rps-postgres
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
      target: dev
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      PORT: "2567"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "2567:2567"
    restart: unless-stopped


  client:
    build:
      context: .
      dockerfile: Dockerfile.client
      target: dev
      args:
        VITE_SERVER_HOST: ${VITE_SERVER_HOST:-rps-server.agustinramirodiaz.dev}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "3001:3001"
    volumes:
      - .:/app
    restart: unless-stopped
    environment:
      VITE_SERVER_HOST: ${VITE_SERVER_HOST:-rps-server.agustinramirodiaz.dev}

  bots:
    build:
      context: .
      dockerfile: Dockerfile.bots
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      SERVER_URL: "server:2567"
      NUM_CREATORS: "2"
      NUM_JOINERS: "10"
    command: ["bun", "run", "--filter", "@rps/bots", "dev"]
    depends_on:
      server:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped


volumes:
  postgres-data:
